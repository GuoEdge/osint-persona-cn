{% extends "base.html" %}
{% block title %}心智画像 — 个人情报工具{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1>心智画像</h1>
    <p class="page-desc">画像来自行为时间线（含高停留、点赞、收藏）；搜罗时会参考近期高关注内容做模拟。</p>
  </div>
  <div class="page-actions">
    <button id="btn-build-persona" class="btn btn-sm">构建画像</button>
  </div>
</div>

<nav class="pipeline-steps card" aria-label="推荐流程">
  <a href="/settings#deps" class="pipeline-step">1. 环境检查</a>
  <span class="pipeline-arrow">→</span>
  <a href="/ingest" class="pipeline-step">2. 完整同步</a>
  <span class="pipeline-arrow">→</span>
  <span class="pipeline-step active">3. 构建画像</span>
  <span class="pipeline-arrow">→</span>
  <a href="/" class="pipeline-step">4. 搜罗</a>
</nav>
<div id="persona-stale-banner" class="alert alert-warn hidden"></div>
<div id="persona-notice" class="alert hidden"></div>
<div id="persona-review-panel" class="card hidden"></div>
<div id="persona-content" class="mt-1"></div>
{% endblock %}
{% block scripts %}
<script>initPersona();</script>
{% endblock %}
